<html lang="zh">
<head>

<title>抽动障碍知识图谱V5</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;background:#fafafa;overflow:hidden;}
header{padding:10px 16px;background:linear-gradient(135deg,#2e7d32,#1b5e20);color:#fff;display:flex;align-items:center;justify-content:space-between;gap:8px;position:relative;z-index:100;}
header h2{font-size:15px;white-space:nowrap;}
.sb{position:relative;flex:1;max-width:280px;}
.sb input{padding:6px 12px 6px 30px;border-radius:16px;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff;font-size:13px;width:100%;outline:none;}
.sb input::placeholder{color:rgba(255,255,255,.7);}
.sb .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);pointer-events:none;}
#sr{position:absolute;top:38px;left:0;right:0;width:auto;max-width:300px;background:#fff;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.18);z-index:999;display:none;max-height:340px;overflow-y:auto;}
.sri{padding:10px 12px;cursor:pointer;font-size:13px;color:#333;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:8px;}
.sri:hover,.sri:active{background:#e8f5e9;}
.st{font-size:10px;padding:2px 7px;border-radius:8px;color:#fff;flex-shrink:0;}
#wrap{position:relative;height:calc(100vh - 50px);}
#network{width:100%;height:100%;background:#fff;position:absolute;top:0;left:0;}
/* 浮动知识卡片 - 跟随节点位置 */
#popup{position:absolute;display:none;z-index:200;pointer-events:auto;max-width:320px;min-width:220px;max-height:50vh;overflow-y:auto;background:#fff;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.2);border:1px solid #e0e0e0;padding:0;transition:opacity .2s;}
#popup.show{display:block;opacity:1;}
#popup-header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px 6px;position:sticky;top:0;background:#fff;z-index:1;border-radius:12px 12px 0 0;}
#popup-close{width:28px;height:28px;border-radius:50%;background:#f0f0f0;border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#666;line-height:1;padding:0;}
#popup-close:active{background:#e0e0e0;}
#popup-body{padding:0 12px 12px;}
#popup .kc{margin:6px 0;}
/* 缩放按钮 - 固定在右下角，移动端友好 */
#zoom-controls{position:absolute;bottom:20px;right:16px;z-index:100;display:flex;flex-direction:column;gap:6px;}
.zm-btn{width:44px;height:44px;border-radius:12px;background:#fff;border:1px solid #ddd;box-shadow:0 2px 8px rgba(0,0,0,.1);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#333;-webkit-user-select:none;user-select:none;}
.zm-btn:active{background:#e8f5e9;border-color:#2e7d32;}
/* 底部工具栏 */
#toolbar{position:absolute;bottom:20px;left:16px;z-index:100;display:flex;gap:8px;}
.tb-btn{padding:8px 14px;border-radius:20px;background:#fff;border:1px solid #ddd;box-shadow:0 2px 8px rgba(0,0,0,.1);font-size:12px;cursor:pointer;color:#333;white-space:nowrap;}
.tb-btn:active{background:#e8f5e9;border-color:#2e7d32;}
/* 图例折叠 */
#legend-bar{position:absolute;top:8px;right:8px;z-index:100;background:#fff;border-radius:8px;padding:6px 10px;box-shadow:0 2px 8px rgba(0,0,0,.08);max-width:180px;}
#legend-toggle{font-size:11px;color:#666;cursor:pointer;user-select:none;}
#legend-content{display:none;margin-top:4px;}
#legend-content.show{display:flex;flex-wrap:wrap;gap:4px 8px;}
.ttl{font-weight:700;font-size:15px;margin-bottom:6px;}
.lgd{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.li{display:flex;align-items:center;gap:3px;font-size:11px;color:#666;}
.ld{width:10px;height:10px;border-radius:50%;}
#detail{font-size:13px;line-height:1.7;}
.kc{border-left:4px solid #2e7d32;padding:10px 12px;background:#f1f8e9;border-radius:0 8px 8px 0;margin:8px 0;line-height:1.8;}
.kc h4{margin:0 0 4px;font-size:13px;color:#1b5e20;}
.kc p{margin:3px 0;color:#555;font-size:12px;}
.kc ul{margin:3px 0 3px 14px;padding:0;}
.kc li{margin:2px 0;color:#444;font-size:12px;}
.badge{display:inline-block;font-size:10px;padding:1px 7px;border-radius:10px;color:#fff;margin-right:5px;}
.chip{display:inline-block;padding:3px 8px;margin:3px 3px 0 0;border-radius:12px;background:#f1f1f1;font-size:12px;}
.btn{display:inline-block;padding:8px 14px;border-radius:6px;background:#2e7d32;color:#fff;cursor:pointer;font-size:13px;margin-right:6px;}
.btn:hover,.btn:active{opacity:.85;}
#ol div{padding:6px 10px;margin-bottom:5px;border-radius:6px;background:#f7f7f7;cursor:pointer;font-size:12px;}
#ol div:hover,#ol div:active{background:#e0e0e0;}
/* 桌面端放大popup和字体 */
@media(min-width:768px){
  #popup{max-width:400px;}
  #zoom-controls{bottom:30px;right:24px;}
  .zm-btn{width:48px;height:48px;font-size:22px;}
}
</style>
</head>

function showDetail(nid, x, y){
  var n=allNodes.get(nid);if(!n)return;
  var kc=KC[nid],c=GC[n.group]||'#999';
  var h='<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><span class="badge" style="background:'+c+'">'+n.group+'</span><b>'+n.label+'</b></div>';
  if(kc){h+='<div class="kc" style="border-color:'+c+'"><h4>📖 知识卡片</h4>';for(var i=0;i<kc.length;i++){h+='<p><b>'+kc[i].t+'</b></p>';if(kc[i].c){h+='<ul>';for(var j=0;j<kc[i].c.length;j++)h+='<li>'+kc[i].c[j]+'</li>';h+='</ul>';}}h+='</div>';}
  var outs=allEdges.get({filter:function(e){return e.from===nid;}});
  if(outs.length){h+='<div style="margin-top:6px"><b>下级：</b></div>';for(var k=0;k<outs.length;k++){var t=allNodes.get(outs[k].to);if(t)h+='<div class="chip">'+outs[k].label+' → '+t.label+'</div>';}}
  var ins=allEdges.get({filter:function(e){return e.to===nid;}});
  if(ins.length){h+='<div style="margin-top:6px"><b>上级：</b></div>';for(var m=0;m<ins.length;m++){var s=allNodes.get(ins[m].from);if(s)h+='<div style="color:#444;margin-top:3px;font-size:12px">'+ins[m].label+' ← '+s.label+'</div>';}}
  // 写入 popup 浮动卡片
  var popup=document.getElementById('popup');
  document.getElementById('popup-body').innerHTML=h;
  document.getElementById('popup-title').innerHTML='<span class="badge" style="background:'+c+'">'+n.group+'</span> '+n.label;
  popup.classList.add('show');
  // 定位：在节点附近
  if(typeof x==='number'&&typeof y==='number'){
    var vw=document.getElementById('network').offsetWidth;
    var vh=document.getElementById('network').offsetHeight;
    var px=x+20,py=y-30;
    if(px+320>vw)px=x-330;
    if(py+200>vh)py=vh-210;
    if(py<10)py=y+30;
    if(px<10)px=10;
    popup.style.left=px+'px';
    popup.style.top=py+'px';
    popup.style.transform='none';
  }else{
    popup.style.left='50%';popup.style.top='15%';
    popup.style.transform='translateX(-50%)';
  }
}
function hidePopup(){document.getElementById('popup').classList.remove('show');}
network.on('click',function(p){
  if(p.nodes&&p.nodes.length>0){
    var nid=p.nodes[0];
    var pos=network.getPosition(nid);
    var canvasPos=network.canvasToDOM({x:pos.x,y:pos.y});
    showDetail(nid,canvasPos.x,canvasPos.y);
    if(!expanded.has(nid)){var outs=allEdges.get({filter:function(e){return e.from===nid;}});var nn=[];outs.forEach(function(e){var t=allNodes.get(e.to);if(t&&!shownNodes.get(e.to))nn.push(t);var se=shownEdges.get({filter:function(b){return b.from===e.from&&b.to===e.to;}});if(!se.length)shownEdges.add(e);});if(nn.length)shownNodes.add(nn);expanded.add(nid);}
  }else{
    hidePopup();
  }
});
network.on('doubleClick',function(p){if(p.nodes&&p.nodes.length>0){var nid=p.nodes[0];network.focus(nid,{scale:1.5,animation:{duration:400}});shownNodes.update({id:nid,color:{background:'#ffd54f'}});setTimeout(function(){shownNodes.update({id:nid,color:undefined});},1200);}});
document.getElementById('tb-reset').onclick=function(){hidePopup();shownNodes.clear();shownEdges.clear();shownNodes.add(allNodes.get("抽动障碍"));expanded.clear();network.fit({animation:{duration:500}});};
document.getElementById('tb-expand').onclick=function(){var q=["抽动障碍"];while(q.length){var cur=q.shift();var outs=allEdges.get({filter:function(ed){return ed.from===cur;}});outs.forEach(function(ed){var t=allNodes.get(ed.to);if(t&&!shownNodes.get(ed.to))shownNodes.add(t);var se=shownEdges.get({filter:function(b){return b.from===ed.from&&b.to===ed.to;}});if(!se.length)shownEdges.add(ed);q.push(ed.to);});expanded.add(cur);}network.fit({animation:{duration:500}});};
document.getElementById('popup-close').onclick=hidePopup;

var KC={};
KC["抽动障碍"]=[{t:"疾病概述",c:["抽动障碍（Tic Disorders）是起病于儿童青少年期的神经精神障碍，以不自主反复快速无目的的运动性抽动和/或发声性抽动为特征。DSM-5分：暂时性、慢性、Tourette综合征。患病率0.3%～1%，男∶女≈3～4∶1。"]},{t:"中医对应",c:["归于\"慢惊风\"\"瘈疭\"\"肝风\"\"抽搐\"范畴。核心病机：肝风内动，与脾心肾功能失调相关。"]}];
KC["DM001"]=[{t:"病机释义",c:["肝亢风动：小儿肝常有余，情志不遂则肝气郁结化火，肝阳上亢引动肝风。肝风内动致筋脉拘急出现肌肉抽动。"]},{t:"关键特征",c:["抽动有力频繁剧烈、烦躁易怒心神不宁、面部抽动明显可累及颈肩上肢、大便秘结小便黄、舌红苔薄脉弦"]},{t:"临床要点",c:["最常见证型，治当平肝泻火息风止痉。久病可向阴虚风动转化。"]}];
KC["DM002"]=[{t:"病机释义",c:["肝郁化火肝风内动：情志不遂致肝失疏泄郁而化火引动肝风。与DM001区别：本型侧重情志郁结化火。"]},{t:"关键特征",c:["烦躁易怒胸胁胀满、异声高亢秽语频发、大便秘结小便黄、脉弦数苔黄"]},{t:"临床要点",c:["有明显情志诱因，心理干预尤为重要。治当疏肝泻火镇肝熄风。"]}];
KC["DM003"]=[{t:"病机释义",c:["脾虚痰聚肝风内动：过食肥甘伤脾，脾失健运水湿停聚酿生痰浊，痰阻经络引动肝风。核心：脾虚→痰聚→风痰鼓动→抽动。"]},{t:"关键特征",c:["抽动无力时轻时重、喉中作声、形体胖大面色萎黄、纳呆腹胀便溏、舌淡苔白腻脉沉滑"]},{t:"临床要点",c:["脾虚为本痰聚为标，治当健脾豁痰。忌肥甘厚味。痰郁化热可转为DM005。"]}];
KC["DM004"]=[{t:"病机释义",c:["脾虚肝亢：脾主肌肉肝主筋。脾虚肌肉失养，肝亢筋脉拘急。土虚木贼。虚实夹杂证。"]},{t:"关键特征",c:["抽动无力反复发作、纳呆腹胀面色萎黄、胆小多疑内向自卑、舌淡苔白脉沉细"]},{t:"临床要点",c:["治当培土抑木疏肝健脾。心理疏导尤为重要。"]}];
KC["DM005"]=[{t:"病机释义",c:["痰火扰心肝风内动：脾虚痰伏久化热，痰火相兼，风痰火热上扰心神。病情较DM003更重。"]},{t:"关键特征",c:["抽动频繁秽语多见、喉中痰鸣胸闷、舌红苔黄腻脉滑数、多梦不安便秘"]},{t:"临床要点",c:["痰热实证治当涤痰清火凉肝熄风。减少电子产品使用。"]}];
KC["DM006"]=[{t:"病机释义",c:["心肝亏虚虚风内动：神气怯弱易受惊吓耗伤心气心血，心肝阴血亏虚筋脉失养。以虚为主。"]},{t:"关键特征",c:["心悸惊恐不安、神气怯弱胆小易惊、双目干涩面色不华、疲劳后加重"]},{t:"临床要点",c:["虚证，治当养心柔肝息风止痉，切忌峻猛攻伐。"]}];
KC["DM007"]=[{t:"病机释义",c:["肝肾阴虚：肾水亏虚水不涵木，肝阴不足筋脉失养拘急，虚火上炎。病机链：肾阴虚→水不涵木→肝阴虚→虚风内动。"]},{t:"关键特征",c:["头晕目眩潮热盗汗、五心烦热形体消瘦、双目干涩胁下胀满、舌红少苔脉细数"]},{t:"临床要点",c:["多见病程较长久病者。治当滋阴潜阳柔肝养肾。忌熬夜。"]}];
KC["DM008"]=[{t:"病机释义",c:["外感风邪引动肝风：肺常不足卫外不固，外风侵袭与内伏肝风相合发抽动。常因感冒诱发加重。"]},{t:"关键特征",c:["面部抽动明显、感冒/上感时加重、舌红苔薄白脉浮、伴鼻塞流涕等"]},{t:"临床要点",c:["先祛外邪再调内风。注意保暖。抽动常随外感治愈缓解。"]}];
KC["DM009"]=[{t:"病机释义",c:["肺肾阴虚：金水相生，先天肾精不足或反复外感耗伤肺阴。咽喉为肺之门户，咽部津液不足则鼻咽部抽动突出。"]},{t:"关键特征",c:["鼻咽部抽动明显（清嗓干咳吸鼻）、潮热盗汗五心烦热、舌红少苔脉细数"]},{t:"临床要点",c:["鼻咽部症状突出需与慢性咽炎鉴别。治当滋养肺肾。"]}];
KC["DM010"]=[{t:"病机释义",c:["心脾两虚：心主血藏神脾为气血生化之源，化源不足气血亏虚。心失所养则神志不宁，脾失健运则肌肉失约。"]},{t:"关键特征",c:["少气懒言面色萎黄、纳呆腹胀便溏、心悸神气怯弱、胆小多疑内向自卑"]},{t:"临床要点",c:["气血两虚证治当健脾养心。与DM004鉴别：本型无肝亢表现。"]}];
KC["DM001_cause"]=[{t:"病因分析",c:["小儿肝常有余情志不遂致气机失调肝阳上亢引动肝风。常见诱因：家庭冲突学习压力社交挫折等。"]},{t:"识证要点",c:["起病前有明显情志诱因、性格急躁外向、舌红苔薄脉弦"]}];
KC["DM002_cause"]=[{t:"病因分析",c:["家长训斥学习压力等致情志抑郁肝失疏泄郁而化火。核心：\"郁\"——长期精神压抑。"]},{t:"识证要点",c:["有明确精神心理应激因素、胸胁胀满善太息、舌边红苔黄脉弦数"]}];
KC["DM003_cause"]=[{t:"病因分析",c:["过食肥甘厚腻损伤脾胃，脾失健运水湿内停聚而生痰，痰阻经络引动肝风。饮食因素重要。"]},{t:"识证要点",c:["饮食习惯差嗜食肥甘、形体偏胖、舌淡苔白腻脉沉滑"]}];
KC["DM004_cause"]=[{t:"病因分析",c:["脾常不足易被外邪饮食所伤，土虚不能制木肝木偏亢。先天禀赋不足或久病亦可致。"]},{t:"识证要点",c:["素体偏弱面色萎黄、食欲差消化不良、兼具脾虚与肝亢"]}];
KC["DM005_cause"]=[{t:"病因分析",c:["脾虚痰伏日久化热或五志过极化火，痰火相兼上扰心神。嗜食辛辣电子产品过度可加重。"]},{t:"识证要点",c:["脾虚痰聚病史久治不愈、舌红苔黄腻脉滑数、心神不宁突出"]}];
KC["DM006_cause"]=[{t:"病因分析",c:["神气怯弱易受惊吓耗伤心气心血，学习压力家庭紧张致情志不舒，久病耗伤阴血。"]},{t:"识证要点",c:["受惊吓或长期精神紧张史、面色不华神疲乏力、心悸失眠胆小易惊"]}];
KC["DM007_cause"]=[{t:"病因分析",c:["先天不足或后天失养，肾水亏虚不能滋肝木制肝阳，虚火上炎灼伤阴液。"]},{t:"识证要点",c:["先天不足或久病史、潮热盗汗五心烦热、舌红少苔脉细数"]}];
KC["DM008_cause"]=[{t:"病因分析",c:["肺常不足卫外不固易感风邪，外风引动内风。发病与季节气候密切相关。"]},{t:"识证要点",c:["发病加重与感冒上感相关、外感症状、脉浮"]}];
KC["DM009_cause"]=[{t:"病因分析",c:["先天肾精不足金水相生失常，或反复外感热病耗伤肺阴，咽喉失于濡润。"]},{t:"识证要点",c:["鼻咽部症状为主、反复呼吸道感染史、阴虚体质"]}];
KC["DM010_cause"]=[{t:"病因分析",c:["禀赋不足或后天失养化源不足气血不充，心失所养脾失健运肌肉失约。"]},{t:"识证要点",c:["素体虚弱面色萎黄、食欲不振消化不良、心悸易惊睡眠不安"]}];
KC["DM001_治法"]=[{t:"治则治法",c:["平肝潜阳息风止动。常用：天麻钩藤石决明代赭石白芍龙骨牡蛎等。方选镇肝熄风汤或天麻钩藤饮加减。"]}];
KC["DM002_治法"]=[{t:"治则治法",c:["疏肝泻火镇肝熄风。常用：龙胆草栀子柴胡黄芩夏枯草白芍等。方选千金龙胆汤或丹栀逍遥散加减。需配合心理疏导。"]}];
KC["DM003_治法"]=[{t:"治则治法",c:["健脾豁痰息风止痉。常用：法半夏陈皮茯苓白术胆南星竹茹天麻等。方选温胆汤或涤痰汤加减。控制饮食。"]}];
KC["DM004_治法"]=[{t:"治则治法",c:["培土抑木疏肝健脾。常用：党参白术茯苓山药白芍柴胡郁金等。方选归脾汤或参术止动汤加减。兼顾心理疏导。"]}];
KC["DM005_治法"]=[{t:"治则治法",c:["涤痰清火凉肝熄风。常用：黄连半夏竹茹枳实胆南星栀子天麻等。方选黄连温胆汤加减。控制电子产品。"]}];
KC["DM006_治法"]=[{t:"治则治法",c:["养心柔肝息风止痉。常用：酸枣仁柏子仁当归白芍五味子龙眼肉天麻等。方选宁动颗粒。禁峻猛攻伐。"]}];
KC["DM007_治法"]=[{t:"治则治法",c:["滋阴潜阳柔肝养肾。常用：熟地黄山茱萸枸杞子菊花白芍龟板鳖甲等。方选杞菊地黄汤合羚角钩藤汤加减。"]}];
KC["DM008_治法"]=[{t:"治则治法",c:["宣肺解表息风止动。常用：桑叶菊花金银花连翘薄荷蝉蜕僵蚕等。方选桑菊饮或银翘散加减。"]}];
KC["DM009_治法"]=[{t:"治则治法",c:["滋养肺肾息风止痉。常用：百合麦冬沙参玄参生地黄熟地黄五味子等。方选百合固金汤加减。"]}];
KC["DM010_治法"]=[{t:"治则治法",c:["健脾养心益气养血。气血双补心脾同治。常用：党参黄芪白术当归龙眼肉酸枣仁茯神等。方选归脾汤合甘麦大枣汤加减。"]}];
KC["DM001_方剂"]=[{t:"镇肝熄风汤",c:["出处《医学衷中参西录》张锡纯。组成：怀牛膝生赭石生龙骨生牡蛎生龟板生白芍玄参天冬川楝子生麦芽茵陈甘草。功效：镇肝熄风滋阴潜阳。"]},{t:"天麻钩藤饮",c:["出处《杂病证治新义》。组成：天麻钩藤石决明栀子黄芩牛膝杜仲益母草桑寄生夜交藤朱茯神。功效：平肝息风清热活血补益肝肾。临床最常用。"]}];
KC["DM002_方剂"]=[{t:"千金龙胆汤",c:["出处《备急千金要方》孙思邈。组成：龙胆草黄芩栀子泽泻木通车前子当归生地黄柴胡甘草。功效：泻肝胆实火清下焦湿热。苦寒不宜久服。"]}];
KC["DM003_方剂"]=[{t:"温胆汤",c:["出处《三因极一病证方论》。组成：半夏竹茹枳实陈皮茯苓甘草生姜大枣。功效：理气化痰清胆和胃。"]},{t:"涤痰汤",c:["出处《奇效良方》。组成：半夏胆南星橘红枳实茯苓人参石菖蒲竹茹甘草。功效：涤痰开窍，痰浊重者用此方。"]}];
KC["DM004_方剂"]=[{t:"归脾汤",c:["出处《正体类要》。组成：白术当归白茯苓黄芪龙眼肉远志酸枣仁木香甘草人参生姜大枣。功效：益气补血健脾养心。心脾两虚经典方。"]},{t:"参术止动汤",c:["临床经验方，以四君子汤为基础加天麻钩藤白芍等。功效：健脾益气平肝息风。专为小儿脾虚肝亢型抽动障碍组方。"]}];
KC["DM005_方剂"]=[{t:"黄连温胆汤",c:["出处《六因条辨》。组成：黄连半夏陈皮茯苓竹茹枳实生姜大枣。功效：清热化痰清心除烦。温胆汤加黄连增强清热力。"]}];
KC["DM006_方剂"]=[{t:"宁动颗粒",c:["中成药制剂，天麻钩藤饮化裁。组方含天麻钩藤白芍酸枣仁等。功效：平肝息风养心安神。多中心临床研究验证有效。"]}];
KC["DM007_方剂"]=[{t:"杞菊地黄汤",c:["出处《医级》。组成：枸杞子菊花熟地黄山茱萸山药茯苓牡丹皮泽泻。功效：滋肾养肝清头明目。常合羚角钩藤汤加强息风。"]}];
KC["DM008_方剂"]=[{t:"桑菊饮",c:["出处《温病条辨》。组成：桑叶菊花杏仁连翘薄荷桔梗甘草芦根。功效：疏风清热宣肺止咳。可合蝉蜕僵蚕增强息风。"]},{t:"银翘散",c:["出处《温病条辨》。组成：金银花连翘荆芥穗薄荷豆豉牛蒡子桔梗竹叶芦根甘草。功效：辛凉透表清热解毒。"]}];
KC["DM009_方剂"]=[{t:"百合固金汤",c:["出处《医方集解》。组成：百合熟地黄生地黄当归白芍甘草桔梗玄参贝母麦冬。功效：滋阴润肺化痰止咳。"]}];
KC["DM010_方剂"]=[{t:"归脾汤合甘麦大枣汤",c:["归脾汤：益气补血健脾养心。甘麦大枣汤：出处《金匮要略》，甘草小麦大枣，养心安神和中缓急。两方合用健脾养心更强。"]}];
KC["DM001_针刺"]=[{t:"选穴方案",c:["百会（醒脑开窍安神定志）、风池（疏风解表清利头目）、阳陵泉（筋会舒筋解痉）、太冲（肝经原穴平肝息风）、合谷（通经活络）、肝俞（疏肝理气）。"]},{t:"操作要点",c:["毫针直刺平补平泻为主肝俞用泻法。留针20～30分钟每日或隔日1次。可配合电针疏密波。"]}];
KC["DM002_针刺"]=[{t:"选穴方案",c:["风池（疏风清头平肝）、太冲（肝经原穴平肝泻火）、行间（肝经荥穴清肝泻火）、神门（心经原穴宁心安神）。"]},{t:"操作要点",c:["太冲、行间均用泻法以泻肝火；神门平补平泻安神；风池泻法疏风清热。留针20～30分钟。"]},{t:"方义",c:["太冲配行间为肝经\"原荥配穴\"，清肝泻火力强；神门宁心安神兼顾神志；风池清热平肝。全方切中肝郁化火证核心病机。"]}];
KC["DM003_针刺"]=[{t:"选穴方案",c:["足三里（健脾和胃扶正培元）、丰隆（化痰要穴）。可配中脘阴陵泉加强健脾化痰。"]},{t:"方义",c:["足三里健脾胃扶正气改善脾虚体质。丰隆化痰第一要穴。标本兼治。"]}];
KC["DM004_针刺"]=[{t:"选穴方案",c:["百会风池印堂（安神息风）、合谷太冲（平肝通经）、太白足三里三阴交（健脾养血调补肝脾肾）。"]},{t:"方义",c:["太白+足三里+三阴交健脾治本，太冲+风池平肝治标，百会+印堂安神。标本兼治补泻兼施。"]}];
KC["DM005_针刺"]=[{t:"选穴方案",c:["百会四神聪（安神镇惊）、风池合谷（疏风清热）、少府劳宫（清心泻火凉血）。"]},{t:"方义",c:["少府+劳宫清心泻火治痰火扰心，百会+四神聪安神，全方重在泻火安神兼息风。"]}];
KC["DM006_针刺"]=[{t:"选穴方案",c:["百会（醒神开窍安神）、神门（心经原穴养心安神）、三阴交（养血柔肝滋阴）、太溪（肾经原穴滋阴补肾填精）。"]},{t:"操作要点",c:["以补法为主，心肝阴血亏虚虚证勿用攻伐。百会平刺补法，神门直刺补法，三阴交太溪均补法，留针30分钟。"]},{t:"方义",c:["神门养心安神治心悸惊恐；太溪补肾滋阴涵养肝木；三阴交补益心肝脾三经阴血；百会安神定志。全方补益心肝扶正止动。"]}];
KC["DM007_针刺"]=[{t:"选穴方案",c:["百会四神聪印堂（安神）、风池合谷（通经息风）、涌泉（引火归元滋阴降火）、肾俞（补肾益精）。"]},{t:"方义",c:["涌泉引火归元要穴治阴虚火旺，肾俞补肾滋阴治本，余穴息风止痉治标。补法为主涌泉可灸。"]}];
KC["DM008_针刺"]=[{t:"选穴方案",c:["百会风池大椎合谷肺俞穴。"]},{t:"方义",c:["大椎+风池+合谷祛外感风邪，肺俞宣肺扶正，百会息风定志。先祛外风再调内风。"]}];
KC["DM009_针刺"]=[{t:"选穴方案",c:["肺俞穴（肺之背俞穴补肺滋阴）、太溪（肾经原穴补肾益精）、照海（滋阴降火利咽）、列缺（肺经络穴宣肺通咽）。"]},{t:"操作要点",c:["全部用补法，重在滋养肺肾之阴。照海列缺为\"八脉交会穴\"对穴，相配专治肺肾阴虚咽喉鼻部病证。留针30分钟，可灸太溪补肾阳。"]},{t:"方义",c:["照海+列缺为奇经八脉交会要穴，专走肺系咽喉；肺俞滋肺阴宣肺气；太溪补肾精填肾阴。全方金水同补，直切肺肾阴虚证机。"]}];
KC["DM010_针刺"]=[{t:"选穴方案",c:["百会（安神升阳）、心俞穴（心之背俞穴养心安神）、脾俞穴（脾之背俞穴健脾益气）、足三里（健脾胃扶正培元）。"]},{t:"操作要点",c:["以补法为主，气血两虚不宜攻伐。背俞穴可配合温灸强化补益，尤以脾俞温灸健脾最佳。留针20～30分钟。"]},{t:"方义",c:["心俞+脾俞前后俞穴直补心脾；足三里健脾胃强气血生化之源；百会升阳益气安神定志。四穴合用心脾同调气血双补。"]}];
KC["百会"]=[{t:"穴位信息",c:["定位：头顶正中线与两耳尖连线交点。归经：督脉。功效：醒脑开窍安神定志升阳举陷息风止痉。\"诸阳之会\"临床极广。"]}];
KC["风池"]=[{t:"穴位信息",c:["定位：颈后区枕骨之下胸锁乳突肌上端与斜方肌上端间凹陷。归经：足少阳胆经。功效：疏风解表清利头目平肝息风。治风要穴。"]}];
KC["阳陵泉"]=[{t:"穴位信息",c:["定位：小腿外侧腓骨小头前下方凹陷。归经：足少阳胆经合穴筋会。功效：疏肝利胆舒筋解痉。善治筋脉拘急。"]}];
KC["太冲"]=[{t:"穴位信息",c:["定位：足背第1、2跖骨间跖骨结合部前方凹陷。归经：足厥阴肝经输穴原穴。功效：平肝息风清热明目疏肝理气。平肝息风第一要穴。"]}];
KC["合谷"]=[{t:"穴位信息",c:["定位：手背第2掌骨桡侧中点。归经：手阳明大肠经原穴。功效：镇静安神通经活络清热解表镇痛。\"面口合谷收\"。"]}];
KC["肝俞穴"]=[{t:"穴位信息",c:["定位：脊柱区第9胸椎棘突下后正中线旁开1.5寸。归经：足太阳膀胱经肝之背俞穴。功效：疏肝理气明目息风。"]}];
KC["足三里"]=[{t:"穴位信息",c:["定位：小腿外侧犊鼻下3寸胫骨前嵴外1横指。归经：足阳明胃经合穴。功效：健脾和胃扶正培元。\"肚腹三里留\"，保健要穴。"]}];
KC["丰隆"]=[{t:"穴位信息",c:["定位：小腿外侧外踝尖上8寸胫骨前肌外缘。归经：足阳明胃经络穴。功效：健脾化痰和胃降逆。化痰第一要穴。"]}];
KC["印堂"]=[{t:"穴位信息",c:["定位：两眉毛内侧端中间凹陷。归经：经外奇穴。功效：清脑安神明目通鼻息风止痉。安神定志常用穴。"]}];
KC["太白"]=[{t:"穴位信息",c:["定位：足内侧第1跖趾关节后方凹陷。归经：足太阴脾经输穴原穴。功效：健脾化湿理气和胃。脾经原穴健脾要穴。"]}];
KC["三阴交"]=[{t:"穴位信息",c:["定位：小腿内侧内踝尖上3寸胫骨内侧缘后际。归经：足太阴脾经交会穴（肝脾肾三经）。功效：健脾养血调补肝脾肾安神。"]}];
KC["四神聪"]=[{t:"穴位信息",c:["定位：头顶部百会穴前后左右各1寸共4穴。归经：经外奇穴。功效：安神定志清利头目醒脑开窍。常与百会配伍。"]}];
KC["少府"]=[{t:"穴位信息",c:["定位：手掌面第4、5掌骨间握拳时小指尖处。归经：手少阴心经荥穴。功效：清心泻火安神定志。善清心经之火。"]}];
KC["劳宫穴"]=[{t:"穴位信息",c:["定位：手掌心第2、3掌骨间偏第3掌骨握拳屈指时中指尖处。归经：手厥阴心包经荥穴。功效：清心泻火凉血安神。清心要穴。"]}];
KC["涌泉"]=[{t:"穴位信息",c:["定位：足底蜷足时足前部凹陷处（约足底前1/3与后2/3交点）。归经：足少阴肾经井穴。功效：滋阴降火醒神开窍引火归元。"]}];
KC["肾俞穴"]=[{t:"穴位信息",c:["定位：脊柱区第2腰椎棘突下后正中线旁开1.5寸。归经：足太阳膀胱经肾之背俞穴。功效：补肾益精温阳利水强腰膝。"]}];
KC["大椎"]=[{t:"穴位信息",c:["定位：脊柱区第7颈椎棘突下凹陷中后正中线上。归经：督脉。功效：解表清热疏风散寒宁神止痉。\"诸阳之会\"。"]}];
KC["肺俞穴"]=[{t:"穴位信息",c:["定位：脊柱区第3胸椎棘突下后正中线旁开1.5寸。归经：足太阳膀胱经肺之背俞穴。功效：宣肺止咳化痰平喘疏风解表。"]}];
KC["行间"]=[{t:"穴位信息",c:["定位：足背第1、2趾间趾蹼缘后方赤白肉际处。归经：足厥阴肝经荥穴。功效：清肝泻火平息肝风凉血安神。肝经火旺首选，清泻力强于太冲。"]}];
KC["神门"]=[{t:"穴位信息",c:["定位：腕前区腕掌侧远端横纹尺侧端尺侧腕屈肌腱的桡侧缘。归经：手少阴心经输穴原穴。功效：养心安神宁心定志。安神第一要穴，主治心悸失眠惊恐。"]}];
KC["太溪"]=[{t:"穴位信息",c:["定位：踝区内踝尖与跟腱之间凹陷中。归经：足少阴肾经输穴原穴。功效：补肾益精滋阴降火壮腰强骨。肾经原穴，滋阴要穴，补肾虚证首选。"]}];
KC["照海"]=[{t:"穴位信息",c:["定位：踝区内踝尖下1寸内踝下缘边际凹陷中。归经：足少阴肾经，八脉交会穴（通阴跷脉）。功效：滋阴清热利咽消肿安神。与列缺相配专治肺系咽喉病证。"]}];
KC["列缺"]=[{t:"穴位信息",c:["定位：前臂桡侧缘腕掌侧远端横纹上1.5寸。归经：手太阴肺经络穴，八脉交会穴（通任脉）。功效：宣肺解表止咳平喘利咽。\"头项寻列缺\"，与照海配伍为肺肾阴虚要穴对。"]}];
KC["心俞穴"]=[{t:"穴位信息",c:["定位：脊柱区第5胸椎棘突下后正中线旁开1.5寸。归经：足太阳膀胱经心之背俞穴。功效：养心安神宽胸理气活血通络。心病要穴，善治心悸失眠心神不宁。"]}];
KC["脾俞穴"]=[{t:"穴位信息",c:["定位：脊柱区第11胸椎棘突下后正中线旁开1.5寸。归经：足太阳膀胱经脾之背俞穴。功效：健脾和胃益气养血化湿统血。脾胃虚弱气血不足之要穴。"]}];
KC["DM001_症状"]=[{t:"主要症状",c:["运动性抽动：抽动有力频繁面部最明显可累及颈肩上肢。发声性：异声高亢可现秽语。精神：烦躁易怒心神不宁。舌脉：舌红苔薄脉弦。"]},{t:"辨证要点",c:["核心：\"有力\"——抽动剧烈频率高反映肝阳上亢风火实证。伴便秘尿黄头晕胁胀。"]}];
KC["DM002_症状"]=[{t:"主要症状",c:["面部颈肩抽动、异声高亢秽语、烦躁易怒胸胁胀满、便秘尿黄、舌红苔黄脉弦数。"]},{t:"辨证要点",c:["与DM001鉴别：以情志抑郁为诱因伴肝郁症状（善太息胸胁胀满）。"]}];
KC["DM003_症状"]=[{t:"主要症状",c:["抽动无力时轻时重、喉中作声、形体胖大面色萎黄、纳呆腹胀便溏、舌淡苔白腻脉沉滑。"]},{t:"辨证要点",c:["核心：抽动无力+痰湿表现（苔白腻形体胖大喉中作声）。"]}];
KC["DM004_症状"]=[{t:"主要症状",c:["抽动无力反复发作、纳呆腹胀面色萎黄、轻度心神不宁、胆小多疑内向自卑、舌淡苔白脉沉细。"]},{t:"辨证要点",c:["兼具脾虚与肝亢但均不剧烈。心理特征（胆小自卑内向）是重要鉴别。"]}];
KC["DM005_症状"]=[{t:"主要症状",c:["抽动频繁秽语、喉中痰鸣胸闷、舌红苔黄腻脉滑数、多梦不安便秘。"]},{t:"辨证要点",c:["核心：苔黄腻+脉滑数反映痰热内盛。与DM002鉴别：本型以痰热为主。"]}];
KC["DM006_症状"]=[{t:"主要症状",c:["抽动较轻疲劳后加重、心悸惊恐不安、双目干涩面色不华、脉细无力。"]},{t:"辨证要点",c:["核心：疲劳后加重——虚证特征。心悸惊恐心神症状突出。"]}];
KC["DM007_症状"]=[{t:"主要症状",c:["抽动反复时轻时重、头晕目眩潮热盗汗五心烦热、形体消瘦双目干涩、舌红少苔脉细数。"]},{t:"辨证要点",c:["阴虚症状群（潮热盗汗+五心烦热+舌红少苔+脉细数）。与DM009鉴别：偏肝肾。"]}];
KC["DM008_症状"]=[{t:"主要症状",c:["面部抽动明显（眨眼皱眉噘嘴）、感冒/上感时加重、舌红苔薄白脉浮、伴鼻塞流涕。"]},{t:"辨证要点",c:["核心：发病加重与外感密切相关。脉浮——表证。"]}];
KC["DM009_症状"]=[{t:"主要症状",c:["鼻咽部抽动明显（清嗓干咳吸鼻）、潮热盗汗五心烦热双目干涩、舌红少苔脉细数。"]},{t:"辨证要点",c:["鼻咽部症状极为突出。需与慢性咽炎过敏性鼻炎鉴别。"]}];
KC["DM010_症状"]=[{t:"主要症状",c:["抽动无力反复、心悸神气怯弱、少气懒言纳呆腹胀便溏、面色萎黄、胆小自卑、舌淡苔白脉细弱。"]},{t:"辨证要点",c:["气血两虚（心悸+面色萎黄+脉细弱）。心理症状突出。无肝亢表现。"]}];
KC["DM001_护理"]=[{t:"调护要点",c:["饮食忌辛辣热性食物宜清淡。情志保持情绪稳定避免急躁愤怒。起居规律作息保证充足睡眠。运动适度助疏泄肝气。"]}];
KC["DM002_护理"]=[{t:"调护要点",c:["心理耐心沟通避免严厉责骂鼓励表达。家庭营造和谐氛围减少冲突。学业合理安排避免过度压力。配合放松训练。"]}];
KC["DM003_护理"]=[{t:"调护要点",c:["饮食减少肥甘厚味多食健脾之品。避免过劳耗气保证休息。控制零食培养良好饮食习惯。"]}];
KC["DM004_护理"]=[{t:"调护要点",c:["饮食宜食健脾之品（山药薏米莲子红枣）。心理耐心沟通关注自卑心理。正面鼓励为主帮助建立自信。"]}];
KC["DM005_护理"]=[{t:"调护要点",c:["心理避免惊吓刺激减少精神紧张。减少电子产品使用时间。忌辛辣煎炸。避免暴力刺激影视内容。"]}];
KC["DM006_护理"]=[{t:"调护要点",c:["饮食忌肥甘厚味宜食养心安神之品（莲子百合酸枣仁）。避免惊吓给予充分安全感。保证睡眠。"]}];
KC["DM007_护理"]=[{t:"调护要点",c:["饮食宜食滋补肾阴之品（黑芝麻桑葚枸杞银耳百合）。忌熬夜保证睡眠。注意保暖避免直吹空调。"]}];
KC["DM008_护理"]=[{t:"调护要点",c:["注意保暖根据天气增减衣物。流感高发期少去公共场所。饮食清淡多饮温水。适当户外活动增强体质。"]}];
KC["DM009_护理"]=[{t:"调护要点",c:["宜食生津润燥之品（雪梨百合银耳蜂蜜）。同时宜食滋补肾阴之品。保持室内湿度适宜。避免大声喊叫。"]}];
KC["DM010_护理"]=[{t:"调护要点",c:["宜食健脾之品（山药薏米莲子）和养血安神之品（大枣桂圆龙眼肉）。规律作息。关注心理健康。适度运动。"]}];
KC["西医致病因素"]=[{t:"西医病因概述",c:["抽动障碍病因尚未完全明确，目前认为是遗传、神经生化、免疫及环境等多因素共同作用的结果。"]}];
KC["西医_遗传"]=[{t:"遗传因素",c:["遗传度约0.77，高度遗传性。一级亲属患病风险显著增高。单卵双胎同病率53%远高于双卵8%。易感基因：SLITRK1、IMMP2L、NRXN1等。遗传模式复杂，可能为多基因遗传。"]}];
KC["西医_神经生化"]=[{t:"神经生化因素",c:["多巴胺假说：纹状体多巴胺功能过度或D2受体超敏。5-羟色胺（5-HT）功能异常。谷氨酸/GABA失衡。皮质-纹状体-丘脑-皮质（CSTC）环路功能障碍。基底节功能异常导致运动控制障碍。"]}];
KC["西医_免疫环境"]=[{t:"免疫与环境因素",c:["A组β溶血性链球菌感染后自身免疫反应（PANDAS）。围产期并发症：早产、低出生体重、窒息等。心理社会应激：家庭冲突、学习压力、创伤事件。性别差异：男∶女≈3～4∶1。"]}];
KC["西医抽动症状"]=[{t:"西医症状概述",c:["抽动障碍主要表现为运动性抽动和/或发声性抽动，可分为简单性和复杂性。根据病程和抽动类型分为暂时性、慢性和Tourette综合征。"]}];
KC["西医_运动抽动"]=[{t:"运动性抽动",c:["简单运动抽动：眨眼、皱眉、耸鼻、噘嘴、甩头、耸肩、扭颈等。复杂运动抽动：触摸物品、拍打、跳跃、旋转、模仿他人动作、秽亵行为等。特点：从头面部开始，逐渐向下蔓延至颈肩、躯干、四肢。可暂时抑制，紧张时加重，睡眠时消失。"]}];
KC["西医_发声抽动"]=[{t:"发声性抽动",c:["简单发声抽动：清嗓、咳嗽、哼声、吸鼻、犬吠声等。复杂发声抽动：重复语言、秽语、重复他人语言等。秽语：约50%患者出现，但非诊断必需。特点：不自主、突然、快速、无目的。"]}];
KC["西医_分型"]=[{t:"疾病分型",c:["暂时性抽动障碍：病程<1年。慢性抽动障碍：病程≥1年，仅运动性或仅发声性抽动。Tourette综合征（抽动秽语综合征）：病程≥1年，同时存在运动性和发声性抽动。起病年龄：4～8岁，10～12岁症状最重，青春期后可自行缓解或持续至成年。"]}];
KC["西医治疗方法"]=[{t:"西医治疗概述",c:["治疗包括药物治疗和非药物治疗。轻症可观察随访，中重度需药物干预。治疗目标：减轻抽动症状，改善共病，提高生活质量。"]}];
KC["西医_药物"]=[{t:"药物治疗",c:["一线药物：氟哌啶醇、利培酮、阿立哌唑（非典型抗精神病药）。二线药物：泰必利、可乐定（α2受体激动剂）。辅助药物：氟西汀、舍曲林（共病OCD、焦虑时）。原则：从小剂量开始，缓慢加量，定期监测不良反应（锥体外系反应、代谢异常等）。不良反应：嗜睡、体重增加、运动迟缓、静坐不能等。"]}];
KC["西医_非药物"]=[{t:"非药物治疗",c:["习惯逆转训练（HRT）：证据最充分的行为疗法。综合行为干预（CBIT）：HRT+放松训练+功能干预。认知行为治疗（CBT）：改善焦虑、强迫等共病。家庭治疗：改善家庭关系，减少应激。深部脑刺激（DBS）：用于难治性病例。重复经颅磁刺激（rTMS）：辅助治疗。"]}];
KC["西医常见共病"]=[{t:"常见共病概述",c:["抽动障碍常伴多种共病，影响预后和治疗。常见共病包括ADHD、OCD、焦虑障碍、抑郁障碍、学习困难等。共病处理影响整体疗效。"]}];
KC["西医_ADHD"]=[{t:"ADHD（注意缺陷多动障碍）",c:["患病率：最常见共病，约50%～70%。特点：ADHD症状常先于抽动出现。表现：注意力不集中、多动、冲动。治疗：首选α2受体激动剂（可乐定、胍法辛）或非典型抗精神病药，避免使用兴奋剂加重抽动。"]}];
KC["西医_OCD"]=[{t:"OCD（强迫障碍）",c:["患病率：约20%～30%合并OCD。表现：反复检查、计数、对称排列、洗手等。与Tourette综合征关系密切。治疗：选择性5-羟色胺再摄取抑制剂（SSRI）如氟西汀、舍曲林，配合认知行为治疗。"]}];
KC["西医_焦虑抑郁"]=[{t:"焦虑与抑郁",c:["患病率：焦虑20%～40%，抑郁10%～20%。表现：过度担忧、恐惧、情绪低落、兴趣减退。病因：抽动与焦虑互为因果，社交困难加重心理问题。治疗：心理治疗+药物治疗（SSRI），改善抽动的同时改善情绪。"]}];
KC["西医_其他共病"]=[{t:"其他共病",c:["学习困难：15%～30%，可能与注意力障碍、焦虑等相关。睡眠障碍：入睡困难、夜醒、噩梦等。自伤行为：约15%重度抽动障碍患者。暴怒发作：突然爆发的愤怒和攻击行为。对立违抗障碍：拒绝服从、敌对行为。"]}];;

/* === 搜索框 === */
(function(){
var inp=document.getElementById('si'),box=document.getElementById('sr');
inp.addEventListener('input',function(){
var q=inp.value.trim().toLowerCase();if(!q){box.style.display='none';return;}
var r=rawNodes.filter(function(n){return n.label.toLowerCase().indexOf(q)>-1||n.group.indexOf(q)>-1;}).slice(0,15);
if(!r.length){box.innerHTML='<div style="padding:10px;color:#999">未找到</div>';box.style.display='block';return;}
box.innerHTML=r.map(function(n){return'<div class="sri" data-id="'+n.id+'"><span class="st" style="background:'+(GC[n.group]||'#999')+'">'+n.group+'</span><span>'+n.label+'</span></div>';}).join('');
box.style.display='block';
box.querySelectorAll('.sri').forEach(function(el){el.addEventListener('click',function(){
var nid=el.getAttribute('data-id');ensureV(nid);network.focus(nid,{scale:1.2,animation:{duration:500}});showDetail(nid);
shownNodes.update({id:nid,color:{background:'#ffd54f'}});setTimeout(function(){shownNodes.update({id:nid,color:undefined});},1500);
box.style.display='none';inp.value='';});});
});
document.addEventListener('click',function(e){if(!e.target.closest('.sb'))box.style.display='none';});
function ensureV(nid){
var ins=allEdges.get({filter:function(e){return e.to===nid;}});
for(var i=0;i<ins.length;i++){if(!shownNodes.get(ins[i].from))ensureV(ins[i].from);if(!shownNodes.get(nid))shownNodes.add(allNodes.get(nid));var se=shownEdges.get({filter:function(b){return b.from===ins[i].from&&b.to===ins[i].to;}});if(!se.length)shownEdges.add(ins[i]);expanded.add(ins[i].from);}updateOL();}
})();

showDetail("抽动障碍");

/* === 缩放控制 === */
document.getElementById('zoom-in').onclick=function(){var s=network.getScale();network.moveTo({scale:s*1.3,animation:{duration:300}});};
document.getElementById('zoom-out').onclick=function(){var s=network.getScale();network.moveTo({scale:s/1.3,animation:{duration:300}});};
document.getElementById('zoom-fit').onclick=function(){network.fit({animation:{duration:500}});};

/* === 图例切换 === */
document.getElementById('legend-toggle').onclick=function(){document.getElementById('legend-content').classList.toggle('show');};

/* === 拖拽图谱时自动关闭popup === */
network.on('dragStart',hidePopup);
network.on('dragEnd',function(){});
/* === 缩放时关闭popup === */
network.on('zoom',hidePopup);

/* === 点击空白区域关闭popup === */
document.getElementById('network').addEventListener('click',function(e){
  if(e.target===this)hidePopup();
});
</script>
